<div class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800" [class.dark]="isDarkTheme()">
  <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
    <!-- Header z przełącznikiem motywów -->
    <div class="fixed left-0 right-0 top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md shadow-sm">
      <div class="mx-auto px-4 py-3 flex justify-end">
        <div class="flex gap-2 bg-gray-100 dark:bg-gray-800 p-1 rounded-full">
          <button (click)="setTheme('light')"
                  class="px-3 py-1 rounded-full text-sm transition-all"
                  [class]="(currentTheme$ | async) === 'light' ? 'bg-white dark:bg-gray-700 shadow-md' : 'hover:bg-gray-200 dark:hover:bg-gray-700'">
            <i class="bi bi-sun-fill"></i> Jasny
          </button>
          <button (click)="setTheme('dark')"
                  class="px-3 py-1 rounded-full text-sm transition-all"
                  [class]="(currentTheme$ | async) === 'dark' ? 'bg-white dark:bg-gray-700 shadow-md' : 'hover:bg-gray-200 dark:hover:bg-gray-700'">
            <i class="bi bi-moon-fill"></i> Ciemny
          </button>
          <button (click)="setTheme('system')"
                  class="px-3 py-1 rounded-full text-sm transition-all"
                  [class]="(currentTheme$ | async) === 'system' ? 'bg-white dark:bg-gray-700 shadow-md' : 'hover:bg-gray-200 dark:hover:bg-gray-700'">
            <i class="bi bi-display"></i> System
          </button>
        </div>
      </div>
    </div>

    <router-outlet></router-outlet>
    <app-social-media></app-social-media>
  </div>
</div>
